<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tideglass — your reading library</title>
  <meta name="description" content="Your novels — translated, narrated, spoiler-safe." />
  <meta name="theme-color" content="#f5f1e8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#211d17" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <script>
    // Apply the saved theme before first paint so dark-mode users never see a white flash.
    (function () {
      try {
        var t = localStorage.getItem("nw-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
        var h = parseInt(localStorage.getItem("nw-accent-h") || "", 10);
        if (!isNaN(h)) document.documentElement.style.setProperty("--accent-h", h);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
