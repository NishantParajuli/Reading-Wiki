services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novelwiki-web
    env_file:
      - .env
    environment:
      # Reach the sidecars over the private bridge (service DNS), NOT host localhost. These
      # override whatever OCR_SIDECAR_URL/TTS_SIDECAR_URL are in .env.
      OCR_SIDECAR_URL: http://ocr:8077
      TTS_SIDECAR_URL: http://tts:8078
      # Shared token the web app presents to the sidecars (sourced from .env / the shell).
      SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:-}
    extra_hosts:
      # We are OFF host networking, so `localhost` inside the container is the container itself.
      # Reach the host's PostgreSQL via the gateway: set DATABASE_URL / DB_SUPERUSER_URL host to
      # `host.docker.internal` in .env (e.g. postgresql://user:pass@host.docker.internal:5432/novelwiki).
      - "host.docker.internal:host-gateway"
    ports:
      # Loopback-only: the Cloudflare tunnel (running on the host) reaches it; public interfaces
      # cannot. Front the tunnel/proxy here; do not bind 0.0.0.0 in production.
      - "127.0.0.1:8001:8001"
    networks:
      - tideglass
    volumes:
      # Persists the BM25 index, import scratch, extracted assets, and cached scrapings
      - wiki_data:/app/data
    restart: unless-stopped

  # OCR sidecar (scanned-PDF import, S3). GPU-only and OPTIONAL — the web app runs fine
  # without it (digital PDFs + EPUB don't need it; scanned PDFs fall back to Gemini vision).
  # Start it on a GPU host with: docker compose up -d ocr
  ocr:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: novelwiki-ocr
    environment:
      # Require the shared/per-service token on /ocr (the web app sends the same value).
      SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:-}
      OCR_SIDECAR_TOKEN: ${OCR_SIDECAR_TOKEN:-}
      # Bind to all interfaces INSIDE the container. The port is deliberately NOT published to the
      # host, so this is only reachable by the web service on the private bridge — never publicly.
      UVICORN_HOST: 0.0.0.0
    networks:
      - tideglass
    restart: unless-stopped
    profiles: ["ocr"]               # only starts when explicitly requested / GPU is present
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # TTS sidecar (audiobook narration via OmniVoice). GPU-only and OPTIONAL — the web app runs
  # fine without it (audio-generation jobs just fail with "sidecar unavailable" until it's up).
  # Holds the OmniVoice model + cached voice-clone prompts; the durable TTS worker in the web
  # app calls it one chapter at a time. Start it on a GPU host with: docker compose up -d tts
  # On a single small GPU (e.g. 6 GB), avoid running `ocr` and `tts` heavy work simultaneously —
  # start whichever you're actively using.
  tts:
    build:
      context: ./sidecar-tts
      dockerfile: Dockerfile
    container_name: novelwiki-tts
    environment:
      # Require the shared/per-service token on /synthesize + /narrate (the web app sends the same value).
      SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:-}
      TTS_SIDECAR_TOKEN: ${TTS_SIDECAR_TOKEN:-}
      # Bind to all interfaces INSIDE the container; the port is NOT published to the host, so the
      # sidecar is only reachable by the web service on the private bridge — never publicly.
      UVICORN_HOST: 0.0.0.0
    networks:
      - tideglass
    restart: unless-stopped
    profiles: ["tts"]               # only starts when explicitly requested / GPU is present
    volumes:
      # Persist the Hugging Face cache so OmniVoice isn't re-downloaded on every rebuild.
      - tts_hf_cache:/root/.cache/huggingface
      # Manage narrator clips from the host (add/replace a voice → restart, no image rebuild).
      - ./sidecar-tts/voices:/app/voices:ro
      # Mount the server too, so sidecar code tweaks apply on restart without a CUDA rebuild.
      - ./sidecar-tts/tts_server.py:/app/tts_server.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# Private bridge: the web app talks to `ocr`/`tts` by service name; sidecar ports are never
# published to the host, so Cloudflare Access / the tunnel can't be bypassed by hitting the host.
networks:
  tideglass:
    name: novelwiki_net
    driver: bridge

volumes:
  wiki_data:
    name: novelwiki_data
  tts_hf_cache:
    name: novelwiki_tts_hf_cache
