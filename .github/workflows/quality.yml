name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  # Keep main runs ordered because each successful main run is a deployment candidate.
  # Superseded branch/PR runs can be cancelled to save time.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: novelwiki
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d novelwiki"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/novelwiki
      DB_SUPERUSER_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/novelwiki
      TEST_DB_SUPERUSER_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SESSION_SECRET: ci-session-secret-at-least-32-characters
      ADMIN_PASSWORD: ci-admin-password
      COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { enable-cache: true }
      - run: uv sync --frozen
      - run: uv run python tools/check_architecture.py --strict
      - run: uv run python -m compileall -q novelwiki
      - run: uv run pytest -q
      - run: uv run python -c 'import asyncio; from novelwiki.db.schema import init_database; asyncio.run(init_database())'
      - run: uv run python tools/benchmark_queries.py --database-url "$TEST_DATABASE_URL" --check
      - run: cp .env.example .env && docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # Match the Node version used by the production Docker image.
        with: { node-version: 20, cache: npm, cache-dependency-path: novelwiki/frontend/package-lock.json }
      - working-directory: novelwiki/frontend
        run: npm ci
      - working-directory: novelwiki/frontend
        run: npm test
      - working-directory: novelwiki/frontend
        run: npm run build
      - working-directory: novelwiki/frontend
        run: npx playwright install --with-deps chromium
      - working-directory: novelwiki/frontend
        run: npm run test:e2e

  container:
    name: Production image
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build the production web image
        run: docker build --build-arg SOURCE_COMMIT="$GITHUB_SHA" --tag tideglass-web:ci .

  deployment-candidate:
    name: Deployment candidate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend, container]
    runs-on: ubuntu-latest
    steps:
      - name: Mark the tested main commit as deployable
        run: echo "Commit $GITHUB_SHA passed every CI gate and can be deployed."
