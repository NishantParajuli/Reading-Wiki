name: quality

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: novelwiki
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d novelwiki"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/novelwiki
      DB_SUPERUSER_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/novelwiki
      TEST_DB_SUPERUSER_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SESSION_SECRET: ci-session-secret-at-least-32-characters
      ADMIN_PASSWORD: ci-admin-password
      COOKIE_SECURE: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { enable-cache: true }
      - run: uv sync --frozen
      - run: uv run python tools/check_architecture.py --strict
      - run: uv run python -m compileall -q novelwiki
      - run: uv run pytest -q
      - run: uv run python -c 'import asyncio; from novelwiki.db.schema import init_database; asyncio.run(init_database())'
      - run: uv run python tools/benchmark_queries.py --database-url "$TEST_DATABASE_URL" --check
      - run: cp .env.example .env && docker compose config --quiet

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: novelwiki/frontend/package-lock.json }
      - working-directory: novelwiki/frontend
        run: npm ci
      - working-directory: novelwiki/frontend
        run: npm test
      - working-directory: novelwiki/frontend
        run: npm run build
      - working-directory: novelwiki/frontend
        run: npx playwright install --with-deps chromium
      - working-directory: novelwiki/frontend
        run: npm run test:e2e
